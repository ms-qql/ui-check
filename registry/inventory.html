<!doctype html><html lang="de"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>UI-Check Registry — Inventar 0.2.0</title>
<style>
 :root{--bg:#0b0b0c;--card:#151517;--line:#26262a;--ink:#f4f4f5;--muted:#a1a1aa;--accent:#c87f2c}
 *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 ui-sans-serif,system-ui,sans-serif}
 header{padding:28px 24px 12px;position:sticky;top:0;background:linear-gradient(var(--bg),var(--bg) 70%,transparent)}
 h1{margin:0 0 4px;font-size:22px} .sub{color:var(--muted);font-size:13px}
 .controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
 input,select{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit}
 input{flex:1;min-width:200px}
 main{padding:8px 24px 60px} h2{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:26px 0 10px}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
 .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
 .card h3{margin:0 0 2px;font-size:15px} .card .name{font-family:ui-monospace,monospace;font-size:12px;color:var(--accent)}
 .card p{margin:8px 0 10px;color:var(--muted);font-size:13px}
 .tags{display:flex;flex-wrap:wrap;gap:6px} .tag{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--muted)}
 .tag.sec{color:var(--ink)} .tag.style{border-color:var(--accent);color:var(--accent)}
 a{color:var(--accent)} .count{color:var(--muted);font-weight:400}
 .hidden{display:none}
</style></head><body>
<header>
 <h1>UI-Check Registry <span class="count">· v0.2.0</span></h1>
 <div class="sub">25 Blocks · 2 Templates. Token-agnostisch — Look kommt aus dem Branding-Profil.</div>
 <div class="controls">
  <input id="q" placeholder="Suche (Name, Titel, Beschreibung, Branche) …"/>
  <select id="fsec"><option value="">alle Sektionen</option></select>
  <select id="fstyle"><option value="">alle Stile</option></select>
  <select id="fsrc"><option value="">alle Quellen</option></select>
 </div>
</header>
<main>
 <section id="templates"><h2>Templates</h2><div class="grid" id="tgrid"></div></section>
 <section><h2>Blocks <span class="count" id="bcount"></span></h2><div class="grid" id="bgrid"></div></section>
</main>
<script>
const DATA={"version":"0.2.0","blocks":[{"name":"hero45","title":"Hero 45 — Feature-Slider-Hero","desc":"Outline-Badge, zentrierte Headline, breites Landscape-Bild (gerundet, unten ausgeblendet) und drei icon-geführte Feature-Spalten; das Bild crossfadet beim Hover der jeweiligen Spalte. Trägt eine Default-Copy als `demo`-Export.","section":"hero","style":"safe","industry":["saas","startup","technology"],"source":"shadcnblocks/hero45 (free)","slots":3,"interactive":true,"file":"blocks/hero45.jsx"},{"name":"verdict-nav","title":"Verdict — Nav","desc":"Schwebende, abgerundete dunkle Navigationsleiste mit Blur und Pill-CTA.","section":"nav","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":0,"interactive":false,"file":"blocks/verdict-nav.jsx"},{"name":"verdict-hero","title":"Verdict — Hero","desc":"Dunkler Full-Bleed-Foto-Hero mit Eyebrow, großer Headline, Bullets, zwei Pill-CTAs und Kennzahlen-/Trusted-by-Leiste.","section":"hero","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":1,"interactive":false,"file":"blocks/verdict-hero.jsx"},{"name":"verdict-about","title":"Verdict — About / Stats","desc":"Intro-Headline + Fließtext, dunkle Bildkarte, vier Kennzahlen, Rating-Zeile mit Bewertungs-Labels.","section":"about","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":1,"interactive":false,"file":"blocks/verdict-about.jsx"},{"name":"verdict-services","title":"Verdict — Services (interaktiv)","desc":"Interaktiver Panel-Strip: ein expandiertes Bild-Panel + eingeklappte Spalten mit römischen Ziffern und vertikalem Text (Hover/Focus).","section":"services","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":5,"interactive":true,"file":"blocks/verdict-services.jsx"},{"name":"verdict-cases","title":"Verdict — Case Studies (Sticky-Stack)","desc":"Sticky-gestapelte Fall-Karten mit Nummer, Tags, Ergebnis, Gericht/Jahr und alternierendem Bild.","section":"portfolio","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":4,"interactive":false,"file":"blocks/verdict-cases.jsx"},{"name":"verdict-process","title":"Verdict — Process (Stepper)","desc":"Großes Bild-Panel mit Step-Overlay + Fünf-Schritt-Tracker; Bild/Text wechseln pro Schritt.","section":"process","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":5,"interactive":true,"file":"blocks/verdict-process.jsx"},{"name":"verdict-team","title":"Verdict — Team","desc":"Versetztes Porträt-Grid (6 Personen) mit Namen/Rolle-Overlay und Hover-Zoom.","section":"team","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":6,"interactive":false,"file":"blocks/verdict-team.jsx"},{"name":"verdict-awards","title":"Verdict — Awards / Trust","desc":"Bildkarte + Award-Liste; erste Zeile hervorgehoben, Akzent-Nummern, Jahr rechts.","section":"trust","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":1,"interactive":false,"file":"blocks/verdict-awards.jsx"},{"name":"verdict-testimonials","title":"Verdict — Testimonials (Bento)","desc":"Bento-Grid aus Foto-, Zitat- und Kennzahl-Kacheln (hell/dunkel/sand).","section":"social-proof","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":4,"interactive":false,"file":"blocks/verdict-testimonials.jsx"},{"name":"verdict-faq","title":"Verdict — FAQ","desc":"Zweispaltig: links Headline + Kontakt-Prompt, rechts Accordion (erste Frage offen).","section":"faq","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":0,"interactive":true,"file":"blocks/verdict-faq.jsx"},{"name":"verdict-contact","title":"Verdict — Contact / CTA","desc":"Kontaktformular-Karte + Amber-Gradient-CTA-Karte mit Kontaktzeilen.","section":"cta","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":0,"interactive":false,"file":"blocks/verdict-contact.jsx"},{"name":"verdict-footer","title":"Verdict — Footer","desc":"Dunkler vierspaltiger Footer: Marke/Tagline, Firm-Links, Offices, Contact + Rechtszeile.","section":"footer","style":"safe","industry":["legal","agency","professional-services"],"source":"verdict","slots":0,"interactive":false,"file":"blocks/verdict-footer.jsx"},{"name":"meridian-nav","title":"Meridian — Nav","desc":"Schwebende, transparente dunkle Top-Leiste mit Globus-Wortmarke und Pill-CTA.","section":"nav","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":0,"interactive":false,"file":"blocks/meridian-nav.jsx"},{"name":"meridian-hero","title":"Meridian — Hero","desc":"Dunkler Hero mit zweizeiliger Space-Grotesk-Headline, zwei CTAs (Primary mit irisierendem Glow) und perspektivisch gekipptem Produkt-Slot.","section":"hero","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":1,"interactive":false,"file":"blocks/meridian-hero.jsx"},{"name":"meridian-glance","title":"Meridian — Glance (Feature-Liste)","desc":"Zweifarbige Headline + Mono-Spec-Karte, darunter Bild-Slot mit Registration-Marks und A–F-Feature-Liste.","section":"feature-list","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":1,"interactive":false,"file":"blocks/meridian-glance.jsx"},{"name":"meridian-bulletin","title":"Meridian — Bulletin (Stats)","desc":"Dispatch-Bar + zweifarbige Headline links, drei Kennzahlen rechts (mittlere invertiert), Fuß-Band mit CTAs.","section":"stats","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":0,"interactive":false,"file":"blocks/meridian-bulletin.jsx"},{"name":"meridian-flow","title":"Meridian — Flow (Steps)","desc":"Vierstufiger Ablauf (erster Schritt hervorgehoben) neben einem stickenden Watch-/Device-Mockup mit SEV-Karte und Budget-Burn-Meter.","section":"steps","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":0,"interactive":true,"file":"blocks/meridian-flow.jsx"},{"name":"meridian-incidents","title":"Meridian — Incidents (Log-Tabelle)","desc":"Asymmetrische Doppel-Headline + Incident-Log-Tabelle mit Mini-Sparklines; Peak-Zeile rot hervorgehoben.","section":"log-table","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":0,"interactive":false,"file":"blocks/meridian-incidents.jsx"},{"name":"meridian-testimonials","title":"Meridian — Testimonials","desc":"Horizontal scrollende Portrait-Zitat-Karten im Editorial-Frame-Stil mit Pagination.","section":"testimonials","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":3,"interactive":true,"file":"blocks/meridian-testimonials.jsx"},{"name":"meridian-compare","title":"Meridian — Compare (us vs them)","desc":"Vergleichstabelle mit zwei Display-Titeln (Legacy durchgestrichen) und sieben Kategorie-Zeilen.","section":"comparison","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":0,"interactive":false,"file":"blocks/meridian-compare.jsx"},{"name":"meridian-island","title":"Meridian — Island (Showcase)","desc":"Großes Blueprint-Panel (metallischer Rahmen) mit Phone-/Dynamic-Island-Mockup und zyklischer Live-Aktivitäts-Liste.","section":"showcase","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":0,"interactive":false,"file":"blocks/meridian-island.jsx"},{"name":"meridian-logos","title":"Meridian — Logos","desc":"Dispatch-Bar + zweifarbige Headline und 4×2-Logo-Wand (bordiertes Grid, Wortmarken als Text, Hover-Detail).","section":"logos","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":0,"interactive":false,"file":"blocks/meridian-logos.jsx"},{"name":"meridian-pricing","title":"Meridian — Pricing (Tickets)","desc":"Drei Preis-Tickets im Beleg-/Receipt-Stil (Mono, gestrichelte Divider, Perforation, Faux-Barcode); mittleres invertiert + hervorgehoben.","section":"pricing","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":0,"interactive":false,"file":"blocks/meridian-pricing.jsx"},{"name":"meridian-footer","title":"Meridian — Footer","desc":"Dispatch-Bar, Riesen-Wortmarke (paper→muted-Verlauf), Newsletter (Glow-CTA), drei Link-Spalten, Rechtszeile.","section":"footer","style":"bold","industry":["saas","developer-tools","observability"],"source":"meridian","slots":0,"interactive":false,"file":"blocks/meridian-footer.jsx"}],"templates":[{"name":"verdict-template","title":"Verdict — Komplett-Template","branding":"verdict","style":"safe","industry":["legal","agency","professional-services"],"sections":["verdict-nav","verdict-hero","verdict-about","verdict-services","verdict-cases","verdict-process","verdict-team","verdict-awards","verdict-testimonials","verdict-faq","verdict-contact","verdict-footer"],"preview":"templates/verdict/preview/dist/index.html"},{"name":"meridian-template","title":"Meridian — Komplett-Template","branding":"meridian","style":"bold","industry":["saas","developer-tools","observability","b2b-tech"],"sections":["meridian-nav","meridian-hero","meridian-glance","meridian-bulletin","meridian-flow","meridian-incidents","meridian-testimonials","meridian-compare","meridian-island","meridian-logos","meridian-pricing","meridian-footer"],"preview":"templates/meridian/preview/dist/index.html"}]};
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e};
const uniq=a=>[...new Set(a)].sort();
for(const s of uniq(DATA.blocks.map(b=>b.section))) fsec.append(new Option(s,s));
for(const s of uniq(DATA.blocks.map(b=>b.style).filter(Boolean))) fstyle.append(new Option(s,s));
for(const s of uniq(DATA.blocks.map(b=>b.source).filter(Boolean))) fsrc.append(new Option(s,s));
function tagRow(b){return '<div class="tags"><span class="tag sec">'+b.section+'</span>'+(b.style?'<span class="tag style">'+b.style+'</span>':'')+
 b.industry.map(i=>'<span class="tag">'+i+'</span>').join('')+
 (b.slots?'<span class="tag">'+b.slots+' Slots</span>':'')+(b.interactive?'<span class="tag">interaktiv</span>':'')+'</div>';}
function renderTemplates(){tgrid.innerHTML='';for(const t of DATA.templates){const c=el('div','card');
 c.innerHTML='<h3>'+t.title+'</h3><div class="name">'+t.name+'</div>'+
  '<p>'+t.sections.length+' Sektionen: '+t.sections.map(s=>'<code>'+s+'</code>').join(' → ')+'</p>'+
  '<div class="tags"><span class="tag sec">'+t.branding+'</span>'+(t.style?'<span class="tag style">'+t.style+'</span>':'')+t.industry.map(i=>'<span class="tag">'+i+'</span>').join('')+'</div>'+
  (t.preview?'<p><a href="'+t.preview+'">Preview öffnen ↗</a></p>':'');
 tgrid.append(c);}}
function renderBlocks(){const q=qInput.value.toLowerCase(),fs=fsec.value,st=fstyle.value,sr=fsrc.value;
 bgrid.innerHTML='';let n=0;
 for(const b of DATA.blocks){
  const hay=(b.name+' '+b.title+' '+b.desc+' '+b.industry.join(' ')+' '+b.source).toLowerCase();
  if(q&&!hay.includes(q))continue; if(fs&&b.section!==fs)continue; if(st&&b.style!==st)continue; if(sr&&b.source!==sr)continue;
  n++;const c=el('div','card');
  c.innerHTML='<h3>'+b.title+'</h3><div class="name">'+b.name+'</div><p>'+(b.desc||'')+'</p>'+tagRow(b);
  bgrid.append(c);}
 bcount.textContent='('+n+')';}
const qInput=document.getElementById('q');
[qInput,fsec,fstyle,fsrc].forEach(e=>e.addEventListener('input',renderBlocks));
renderTemplates();renderBlocks();
</script></body></html>
